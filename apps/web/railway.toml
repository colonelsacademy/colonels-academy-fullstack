[build]
builder = "nixpacks"
buildCommand = "cd ../.. && npm install -g corepack@0.31.0 && corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @colonels-academy/database run db:generate && pnpm --filter @colonels-academy/web run build"

[deploy]
startCommand = "node ../../apps/web/.next/standalone/apps/web/server.js"
