[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g corepack@0.31.0",
  "corepack enable",
  "corepack prepare pnpm@10.33.0 --activate",
  "cd /app && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd /app && pnpm --filter @colonels-academy/database run db:generate",
  "cd /app && pnpm --filter @colonels-academy/web run build"
]

[start]
cmd = "HOSTNAME=0.0.0.0 node /app/apps/web/.next/standalone/apps/web/server.js"
