[build]
builder = "nixpacks"
buildCommand = "npm install -g corepack@0.31.0 && corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @colonels-academy/api run build"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
startCommand = "cd /app && pnpm --filter @colonels-academy/database run db:push && pnpm --filter @colonels-academy/database run db:seed:direct && pnpm --filter @colonels-academy/api run seed:asi-mock-tests && pnpm --filter @colonels-academy/api run start"

