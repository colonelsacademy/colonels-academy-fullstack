[phases.install]
cmds = [
  "npm install -g corepack@0.31.0",
  "corepack enable",
  "corepack prepare pnpm@10.0.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @colonels-academy/database run db:generate",
  "pnpm --filter @colonels-academy/api run build"
]

[start]
cmd = "node apps/api/dist/index.cjs"
