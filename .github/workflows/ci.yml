name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      contracts: ${{ steps.filter.outputs.contracts }}
      database: ${{ steps.filter.outputs.database }}
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Any change to the shared contract or database layer triggers a full quality check.
            # These packages require Backend Lead review before merging (enforce in GitHub branch rules).
            contracts:
              - 'packages/contracts/**'
            database:
              - 'packages/database/**'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            web:
              - 'apps/web/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            api:
              - 'apps/api/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - 'packages/database/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            worker:
              - 'apps/worker/**'
              - 'packages/contracts/**'
              - 'packages/config/**'
              - 'packages/database/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            mobile:
              - 'apps/mobile/**'
              - 'packages/api-client/**'
              - 'packages/config/**'
              - 'packages/contracts/**'
              - 'packages/design-tokens/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm run check:boundaries
      - run: pnpm run typecheck

  build-web:
    needs: [changes, quality]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm --filter @colonels-academy/web run build

  build-api:
    needs: [changes, quality]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm --filter @colonels-academy/api run build

  build-worker:
    needs: [changes, quality]
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm --filter @colonels-academy/worker run build

  build-mobile:
    needs: [changes, quality]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @colonels-academy/mobile run build

  # ─── Required gate ────────────────────────────────────────────────────────────
  # This is the SINGLE required status check to configure in GitHub branch
  # protection for both `dev` and `main`. It only passes when every triggered
  # build job has succeeded (or was skipped because no relevant files changed).
  # Add "ci-gate" as the required check name in: Settings → Branches → Rules.
  ci-gate:
    if: always()
    needs: [quality, build-web, build-api, build-worker, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ A required job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "✅ All required checks passed."

  # ─── Contracts / Database change guard ───────────────────────────────────────
  # Warns when a PR touches packages/contracts or packages/database.
  # Configure Backend Lead as a required reviewer for these paths in:
  # Settings → Code and Automation → Code owners (CODEOWNERS file).
  guard-sensitive-packages:
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Flag sensitive package changes
        run: |
          echo "⚠️  This PR touches packages/contracts or packages/database."
          echo "    These changes require Backend Lead review before merging."
          echo "    Ensure a CODEOWNERS rule routes this PR for approval."
